name: Update League Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # Daily 6 AM UTC

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scraper && npm ci

      - name: Run scraper for all leagues
        run: cd scraper && node index.js --league all
        env:
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update league data [bot]"
          git push
